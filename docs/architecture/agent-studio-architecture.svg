<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100" role="img" aria-labelledby="title desc">
  <title id="title">Agent Studio architecture map</title>
  <desc id="desc">Architecture diagram generated from repository scan on 2026-04-29.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L10,4 L0,8 Z" fill="#6b7280"/></marker>
    <style>
      .bg{fill:#f8fafc}.band{fill:#fff;stroke:#d1d5db;stroke-width:1.4}.box{fill:#fff;stroke:#334155;stroke-width:1.4;rx:10}.client{fill:#e0f2fe}.api{fill:#dcfce7}.core{fill:#fef3c7}.tool{fill:#ede9fe}.data{fill:#fee2e2}.ext{fill:#e5e7eb}.worker{fill:#ccfbf1}.title{font:700 30px Arial,sans-serif;fill:#0f172a}.subtitle{font:14px Arial,sans-serif;fill:#475569}.h{font:700 18px Arial,sans-serif;fill:#111827}.t{font:13px Arial,sans-serif;fill:#1f2937}.s{font:12px Arial,sans-serif;fill:#475569}.tiny{font:11px Arial,sans-serif;fill:#64748b}.label{font:700 13px Arial,sans-serif;fill:#374151}.arrow{fill:none;stroke:#6b7280;stroke-width:2;marker-end:url(#arrow)}.dash{fill:none;stroke:#94a3b8;stroke-width:2;stroke-dasharray:6 5;marker-end:url(#arrow)}.heavy{fill:none;stroke:#0f766e;stroke-width:3;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1600" height="1100"/>
  <text class="title" x="60" y="55">Agent Studio Architecture</text>
  <text class="subtitle" x="60" y="82">Scanned repo paths: frontend, electron, backend/api, backend/core/s01-s12, adapters, storage, skills, docker-compose.</text>

  <rect class="band" x="40" y="110" width="1520" height="140" rx="16"/>
  <text class="label" x="60" y="138">Clients and entrypoints</text>
  <rect class="box client" x="70" y="160" width="250" height="65"/>
  <text class="h" x="90" y="185">React Web UI</text><text class="s" x="90" y="207">frontend/src App, stores, ws, api-client</text>
  <rect class="box client" x="360" y="160" width="230" height="65"/>
  <text class="h" x="380" y="185">Electron shell</text><text class="s" x="380" y="207">electron/main.js + preload.js</text>
  <rect class="box client" x="630" y="160" width="230" height="65"/>
  <text class="h" x="650" y="185">CLI miniclaude</text><text class="s" x="650" y="207">backend/cli.py, cli_support/session.py</text>
  <rect class="box client" x="900" y="160" width="270" height="65"/>
  <text class="h" x="920" y="185">OpenAI compatible clients</text><text class="s" x="920" y="207">POST /v1/chat/completions</text>
  <rect class="box ext" x="1210" y="160" width="280" height="65"/>
  <text class="h" x="1230" y="185">Container runtime</text><text class="s" x="1230" y="207">Docker Compose: app, sub-worker, postgres, redis</text>

  <rect class="band" x="40" y="290" width="1520" height="150" rx="16"/>
  <text class="label" x="60" y="318">HTTP and realtime boundary: backend/api</text>
  <rect class="box api" x="70" y="340" width="260" height="70"/>
  <text class="h" x="90" y="365">FastAPI app lifecycle</text><text class="s" x="90" y="388">init_db, init_redis, metrics, runtime, scheduler</text>
  <rect class="box api" x="365" y="340" width="285" height="70"/>
  <text class="h" x="385" y="365">REST routes</text><text class="s" x="385" y="388">sessions, providers, mcp, metrics, logs, reports</text>
  <rect class="box api" x="690" y="340" width="275" height="70"/>
  <text class="h" x="710" y="365">WebSocket manager</text><text class="s" x="710" y="388">/ws/{session_id}, events, abort, pubsub</text>
  <rect class="box api" x="1005" y="340" width="260" height="70"/>
  <text class="h" x="1025" y="365">Chat completions route</text><text class="s" x="1025" y="388">OpenAI shape -> internal Message loop</text>
  <rect class="box api" x="1305" y="340" width="185" height="70"/>
  <text class="h" x="1325" y="365">Auth/CORS</text><text class="s" x="1325" y="388">token middleware + SPA mount</text>

  <rect class="band" x="40" y="480" width="1020" height="360" rx="16"/>
  <text class="label" x="60" y="508">Core agent runtime: backend/core</text>
  <rect class="box core" x="70" y="535" width="275" height="105"/>
  <text class="h" x="90" y="560">AgentRuntime + Skills</text><text class="s" x="90" y="584">s05_skills/runtime.py</text><text class="s" x="90" y="605">SkillLoader -> SpecRegistry -> filtered tools</text><text class="tiny" x="90" y="626">skills/*/SKILL.md, tools.yaml, sub_agents.yaml</text>
  <rect class="box core" x="385" y="535" width="285" height="105"/>
  <text class="h" x="405" y="560">AgentLoop</text><text class="s" x="405" y="584">s01_agent_loop/agent_loop.py</text><text class="s" x="405" y="605">messages -> LLM -> tool calls -> results</text><text class="tiny" x="405" y="626">status events, checkpoints, max iterations</text>
  <rect class="box core" x="710" y="535" width="300" height="105"/>
  <text class="h" x="730" y="560">ProviderManager + Adapters</text><text class="s" x="730" y="584">adapters/provider_manager.py</text><text class="s" x="730" y="605">ProviderStore -> AdapterFactory</text><text class="tiny" x="730" y="626">OpenAI-compatible, Anthropic, Ollama</text>
  <rect class="box tool" x="70" y="685" width="300" height="115"/>
  <text class="h" x="90" y="710">Tool system</text><text class="s" x="90" y="733">ToolRegistry, SecurityGate, ToolExecutor</text><text class="s" x="90" y="754">builtin tools: Read, Glob, Grep, edit, Bash, web, proxy</text><text class="tiny" x="90" y="775">structured ToolResult + optional FileDiff</text>
  <rect class="box tool" x="405" y="685" width="285" height="115"/>
  <text class="h" x="425" y="710">MCP bridge</text><text class="s" x="425" y="733">MCPServerManager + MCPToolBridge</text><text class="s" x="425" y="754">server tools registered as mcp__server__tool</text><text class="tiny" x="425" y="775">dynamic sync by manager version</text>
  <rect class="box core" x="725" y="685" width="285" height="115"/>
  <text class="h" x="745" y="710">Context compression</text><text class="s" x="745" y="733">s06_context_compression</text><text class="s" x="745" y="754">TokenCounter + ThresholdPolicy + Compressor</text><text class="tiny" x="745" y="775">compacts before oversize LLM request</text>

  <rect class="band" x="1100" y="480" width="460" height="360" rx="16"/>
  <text class="label" x="1120" y="508">Async orchestration and scheduled work</text>
  <rect class="box worker" x="1130" y="535" width="370" height="90"/>
  <text class="h" x="1150" y="560">spawn_agent path</text><text class="s" x="1150" y="583">Tool submits sub-agent tasks to Redis queue</text><text class="tiny" x="1150" y="606">s02_tools/builtin/spawn_agent.py</text>
  <rect class="box worker" x="1130" y="655" width="370" height="90"/>
  <text class="h" x="1150" y="680">sub-worker service</text><text class="s" x="1150" y="703">backend/sub_worker.py claims, renews lease, executes loop</text><text class="tiny" x="1150" y="726">checkpoints to SessionStore; result to queue/store</text>
  <rect class="box worker" x="1130" y="775" width="370" height="45"/>
  <text class="h" x="1150" y="803">TaskScheduler -> TaskExecutor -> reports/Feishu</text>

  <rect class="band" x="40" y="880" width="1520" height="160" rx="16"/>
  <text class="label" x="60" y="908">State, files, and external systems</text>
  <rect class="box data" x="70" y="935" width="245" height="65"/>
  <text class="h" x="90" y="960">PostgreSQL</text><text class="s" x="90" y="982">sessions, messages, providers, MCP, tasks</text>
  <rect class="box data" x="355" y="935" width="220" height="65"/>
  <text class="h" x="375" y="960">Redis</text><text class="s" x="375" y="982">sub-agent queue, pubsub, metrics locks</text>
  <rect class="box data" x="615" y="935" width="235" height="65"/>
  <text class="h" x="635" y="960">Workspace + reports</text><text class="s" x="635" y="982">file tools, diffs, markdown reports, logs</text>
  <rect class="box ext" x="890" y="935" width="230" height="65"/>
  <text class="h" x="910" y="960">LLM providers</text><text class="s" x="910" y="982">OpenAI-compatible, Anthropic, Ollama</text>
  <rect class="box ext" x="1160" y="935" width="320" height="65"/>
  <text class="h" x="1180" y="960">External tools</text><text class="s" x="1180" y="982">MCP servers, Mihomo, YouTube, X, Feishu, Lingxi</text>

  <path class="arrow" d="M195 225 C195 270, 190 300, 200 340"/><path class="arrow" d="M475 225 C475 270, 475 300, 505 340"/><path class="arrow" d="M745 225 C745 290, 580 450, 527 535"/><path class="arrow" d="M1035 225 C1035 270, 1100 300, 1135 340"/>
  <path class="arrow" d="M200 410 C250 460, 350 505, 385 565"/><path class="arrow" d="M825 410 C780 460, 660 500, 590 535"/><path class="arrow" d="M1135 410 C1040 470, 900 500, 850 535"/>
  <path class="heavy" d="M670 587 C685 587, 695 587, 710 587"/><path class="heavy" d="M527 640 C527 660, 527 670, 527 685"/><path class="arrow" d="M527 640 C440 660, 315 675, 220 685"/><path class="dash" d="M867 640 C865 655, 865 670, 867 685"/>
  <path class="arrow" d="M370 742 C385 742, 390 742, 405 742"/><path class="arrow" d="M1010 587 C1110 590, 1120 580, 1130 580"/><path class="arrow" d="M1315 625 C1315 640, 1315 645, 1315 655"/>
  <path class="arrow" d="M1315 745 C1315 760, 1315 765, 1315 775"/><path class="arrow" d="M207 800 C180 855, 175 900, 190 935"/><path class="arrow" d="M545 800 C500 855, 460 900, 465 935"/><path class="arrow" d="M860 640 C900 750, 980 860, 1005 935"/>
  <path class="arrow" d="M1315 820 C1200 880, 1070 905, 1015 935"/><path class="arrow" d="M1315 820 C965 870, 770 890, 735 935"/><path class="arrow" d="M1315 745 C1060 830, 500 875, 465 935"/>
  <text class="tiny" x="240" y="285">REST</text><text class="tiny" x="770" y="300">CLI direct core</text><text class="tiny" x="735" y="575">LLM request</text><text class="tiny" x="300" y="675">tool calls</text><text class="tiny" x="1220" y="648">Redis queue</text><text class="tiny" x="980" y="905">provider calls</text>
  <rect class="band" x="60" y="1048" width="1480" height="32" rx="8"/>
  <text class="tiny" x="80" y="1068">Reading guide: solid arrows are runtime calls; dashed arrow is context compaction; teal arrows are the main LLM loop. Core modules remain FastAPI-free and are reused by WebSocket, OpenAI-compatible HTTP, CLI, scheduled tasks, and sub-workers.</text>
</svg>
