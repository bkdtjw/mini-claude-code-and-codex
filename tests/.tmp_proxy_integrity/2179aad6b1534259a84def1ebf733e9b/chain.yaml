mixed-port: 7890
external-controller: 127.0.0.1:9090
dns:
  enable: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
  - 223.5.5.5
  - 119.29.29.29
  proxy-server-nameserver:
  - https://1.0.0.1/dns-query
  - https://doh.pub/dns-query
  - 1.1.1.1
  nameserver:
  - https://doh.pub/dns-query
  - https://dns.alidns.com/dns-query
  fallback:
  - https://1.0.0.1/dns-query
  - https://8.8.4.4/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
rules:
- MATCH,GLOBAL
rule-providers:
  demo:
    type: http
proxies:
- name: 香港A
  type: ss
  server: hk.example.com
  port: 443
- name: 日本A
  type: ss
  server: jp.example.com
  port: 443
- name: EXIT-出口
  type: trojan
  server: us.example.com
  port: 443
  password: pass
- name: EXIT-relay
  type: http
  server: r.example.com
  port: 80
proxy-groups:
- name: GLOBAL
  type: select
  proxies:
  - 香港A
  - 日本A
  - EXIT-出口
  - EXIT-relay
